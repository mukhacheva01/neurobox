name: neurobox

x-service-defaults: &service-defaults
  restart: always
  env_file: .env
  networks:
    - nb_net

x-runtime-env: &runtime-env
  POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  POSTGRES_DB: ${POSTGRES_DB:-neurobox}
  POSTGRES_USER: ${POSTGRES_USER:-neurobox}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_PASSWORD: ${REDIS_PASSWORD}

services:
  redis:
    image: redis:7-alpine
    container_name: neurobox_redis
    restart: always
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - nb_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    <<: *service-defaults
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: neurobox_backend
    environment:
      <<: *runtime-env
      ADMIN_API_PORT: "8092"
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8092:8092"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8092/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  bot:
    <<: *service-defaults
    build:
      context: .
      dockerfile: docker/bot.Dockerfile
    container_name: neurobox_bot
    environment:
      <<: *runtime-env
      BACKEND_URL: ${BACKEND_URL:-http://backend:8092}
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "/app/scripts/healthcheck_bot.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  worker:
    <<: *service-defaults
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: neurobox_worker
    environment:
      <<: *runtime-env
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "/app/scripts/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  admin:
    <<: *service-defaults
    build:
      context: .
      dockerfile: docker/admin.Dockerfile
    container_name: neurobox_admin
    environment:
      <<: *runtime-env
      BACKEND_URL: ${BACKEND_URL:-http://backend:8092}
      ADMIN_PANEL_PORT: "8091"
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:8091:8091"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8091/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  redis_data:

networks:
  nb_net:
    driver: bridge
