name: neurobox

services:
  postgres:
    image: postgres:16-alpine
    container_name: neurobox_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-neurobox}
      POSTGRES_USER: ${POSTGRES_USER:-neurobox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks: [nb_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-neurobox}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: neurobox_redis
    restart: always
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
    volumes:
      - redis_data:/data
    networks: [nb_net]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: neurobox_backend
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-neurobox}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-neurobox}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [nb_net]
    ports:
      - "127.0.0.1:8092:8092"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8092/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits: { memory: 512M }
        reservations: { memory: 128M }

  bot:
    build:
      context: .
      dockerfile: docker/bot.Dockerfile
    container_name: neurobox_bot
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-neurobox}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-neurobox}
      BACKEND_URL: http://backend:8092
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      backend: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [nb_net]
    healthcheck:
      test: ["CMD", "python", "/app/scripts/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits: { memory: 384M }
        reservations: { memory: 96M }

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: neurobox_worker
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-neurobox}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-neurobox}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      backend: { condition: service_healthy }
    networks: [nb_net]
    healthcheck:
      test: ["CMD", "python", "/app/scripts/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits: { memory: 512M }
        reservations: { memory: 128M }

  admin:
    build:
      context: .
      dockerfile: docker/admin.Dockerfile
    container_name: neurobox_admin
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-neurobox}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-neurobox}
      BACKEND_URL: http://backend:8092
      ADMIN_PANEL_PORT: "8091"
    depends_on:
      backend: { condition: service_healthy }
    networks: [nb_net]
    ports:
      - "127.0.0.1:8091:8091"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8091/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits: { memory: 256M }
        reservations: { memory: 64M }

volumes:
  pg_data:
  redis_data:

networks:
  nb_net:
    driver: bridge
