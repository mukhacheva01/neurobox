services:
  postgres:
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    ports:
      - "127.0.0.1:6379:6379"

  backend:
    volumes:
      - .:/app
    environment:
      LOG_LEVEL: DEBUG

  bot:
    volumes:
      - .:/app
    environment:
      LOG_LEVEL: DEBUG

  worker:
    volumes:
      - .:/app
    environment:
      LOG_LEVEL: DEBUG

  admin:
    volumes:
      - .:/app
